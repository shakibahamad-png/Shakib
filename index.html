<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakib | Trading Journal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root { --primary: #8b5cf6; --bg-body: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #334155; --success: #10b981; --danger: #ef4444; }
        [data-theme="light"] { --bg-body: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-dim: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); transition: 0.3s; min-height: 100vh; }

        nav { padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 20px; }

        .month-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; padding: 10px; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); }
        .month-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-dim); cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .month-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 1.2rem; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.3rem; font-weight: 800; }

        .journal-box { background: var(--card-bg); border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 0.8rem; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .win { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .loss { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .year-select { padding: 8px; border-radius: 8px; background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border); font-weight: 700; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 20px; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 25px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); font-weight: 600; outline: none; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .login-btn-nav { background: var(--primary); color: white; padding: 6px 15px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.8rem; }
        .admin-only { display: none; } /* Class to hide admin elements from public */
    </style>
</head>
<body>

    <div id="main-app">
        <nav>
            <h2 style="font-size: 1.1rem; color:var(--primary); font-weight:800;">SHAKIB JOURNAL</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span class="material-icons-round" style="cursor:pointer; color:var(--primary)" onclick="toggleTheme()" id="theme-icon">light_mode</span>
                <select id="yearFilter" class="year-select" onchange="renderData()">
                    <option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option>
                </select>
                <div id="auth-section">
                    <button class="login-btn-nav" onclick="login()">ADMIN LOGIN</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="month-nav" id="monthNav"></div>
            
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Trades</h3><div class="value" id="s-count">0</div></div>
                <div class="stat-card"><h3>Win Rate</h3><div class="value" id="s-rate" style="color:var(--success)">0%</div></div>
                <div class="stat-card admin-only" id="admin-invest-card"><h3>Total Invested</h3><div class="value" id="s-invest">$0</div></div>
                <div class="stat-card"><h3>Net Profit (PnL)</h3><div class="value" id="s-profit">$0</div></div>
            </div>

            <div class="journal-box">
                <table>
                    <thead>
                        <tr>
                            <th>Coin & Lev</th>
                            <th>Side</th>
                            <th class="admin-only">Invest</th> <th>Result</th>
                            <th>PnL%</th>
                            <th>Profit ($)</th>
                            <th id="th-action" style="display:none">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="fab" id="fab-btn" onclick="openModal()"><span class="material-icons-round">add</span></div>
    </div>

    <div class="modal" id="tradeModal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px; font-size:1.1rem">New Trade Entry</h2>
            <input type="text" id="coinInput" placeholder="BTC/USDT">
            <div style="display: flex; gap: 10px;">
                <select id="yearInput"><option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option></select>
                <input type="text" id="levInput" placeholder="Leverage (e.g. 20x)">
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="sideInput"><option value="LONG">LONG</option><option value="SHORT">SHORT</option></select>
                <input type="number" id="investInput" placeholder="Investment $">
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="resultInput"><option value="WIN">WIN</option><option value="LOSS">LOSS</option></select>
                <input type="number" id="pnlInput" placeholder="PnL %">
            </div>
            <button id="saveBtn" class="btn-save" onclick="saveTrade()">SAVE TO DATABASE</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:10px; cursor:pointer; color:var(--text-dim); font-weight:600;">Cancel</button>
        </div>
    </div>

    <script>
        const _admin = "faltoshakib@gmail.com";
        const firebaseConfig = {
            apiKey: "AIzaSyA1Y77HBNw1HRpNGDbmZkiDbddm_pX-Yjw",
            authDomain: "shakib-e148d.firebaseapp.com",
            databaseURL: "https://shakib-e148d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shakib-e148d",
            storageBucket: "shakib-e148d.firebasestorage.app",
            messagingSenderId: "717674222128",
            appId: "1:717674222128:web:ef6d239273aea8121d13f5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const monthsArr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let trades = [];
        let curMonth = monthsArr[new Date().getMonth()];

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm("Logout korben?")) auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const authDiv = document.getElementById('auth-section');
            const isAdmin = user && user.email === _admin;
            
            // Toggle Admin Elements
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            // Table columns need 'table-cell' instead of 'block'
            document.querySelectorAll('th.admin-only, td.admin-only').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');

            if(isAdmin) {
                authDiv.innerHTML = `<img src="${user.photoURL}" style="width:35px; border-radius:50%; border:2px solid var(--primary); cursor:pointer;" onclick="logout()">`;
                document.getElementById('fab-btn').style.display = 'flex';
                document.getElementById('th-action').style.display = 'table-cell';
            } else {
                authDiv.innerHTML = `<button class="login-btn-nav" onclick="login()">ADMIN LOGIN</button>`;
                document.getElementById('fab-btn').style.display = 'none';
                document.getElementById('th-action').style.display = 'none';
            }
            renderData();
        });

        db.ref('trades').on('value', snapshot => {
            const val = snapshot.val();
            trades = val ? Object.keys(val).map(k => ({id: k, ...val[k]})) : [];
            renderData();
        });

        function initApp() {
            document.getElementById('monthNav').innerHTML = monthsArr.map(m => `<button class="month-btn ${m===curMonth?'active':''}" onclick="setMonth('${m}')">${m}</button>`).join('');
            renderData();
        }

        function setMonth(m) {
            curMonth = m;
            document.querySelectorAll('.month-btn').forEach(b => b.classList.toggle('active', b.innerText === m));
            renderData();
        }

        function renderData() {
            const selectedYear = document.getElementById('yearFilter').value;
            const target = `${curMonth}-${selectedYear}`;
            const isAdmin = auth.currentUser && auth.currentUser.email === _admin;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let tInv = 0, tPnl = 0, wins = 0, count = 0;
            const filtered = trades.filter(t => t.period === target).reverse();

            filtered.forEach(t => {
                const isWin = t.result === 'WIN';
                const pnlNum = parseFloat(t.pnl) || 0;
                const investNum = parseFloat(t.invest) || 0;
                const dVal = (investNum * (pnlNum / 100));
                
                if(isWin) wins++; 
                tInv += investNum; 
                tPnl += dVal; 
                count++;

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${t.coin}</strong><br><small style="color:var(--text-dim)">${t.lev || '1x'}</small></td>
                        <td style="color:${t.side==='LONG'?'var(--success)':'var(--danger)'}; font-weight:700;">${t.side}</td>
                        <td class="admin-only" style="display:${isAdmin?'table-cell':'none'}">$${investNum}</td>
                        <td><span class="badge ${isWin?'win':'loss'}">${t.result}</span></td>
                        <td style="font-weight:700;">${pnlNum}%</td>
                        <td style="color:${dVal>=0?'var(--success)':'var(--danger)'}; font-weight:700;">${dVal>=0?'+':''}$${dVal.toFixed(2)}</td>
                        <td style="display:${isAdmin?'table-cell':'none'}"><span class="material-icons-round" style="cursor:pointer; color:#94a3b8;" onclick="delTrade('${t.id}')">delete_outline</span></td>
                    </tr>`;
            });

            document.getElementById('s-count').innerText = count;
            document.getElementById('s-rate').innerText = count > 0 ? ((wins/count)*100).toFixed(1)+'%' : '0%';
            document.getElementById('s-invest').innerText = '$'+tInv.toFixed(2);
            document.getElementById('s-profit').innerText = (tPnl>=0?'+':'')+'$'+tPnl.toFixed(2);
            document.getElementById('s-profit').style.color = tPnl>=0 ? 'var(--success)' : 'var(--danger)';
        }

        function saveTrade() {
            if(!auth.currentUser || auth.currentUser.email !== _admin) return alert("Unauthorized!");
            const coin = document.getElementById('coinInput').value.toUpperCase();
            const lev = document.getElementById('levInput').value || '1x';
            const invest = parseFloat(document.getElementById('investInput').value);
            let pnl = parseFloat(document.getElementById('pnlInput').value);
            const res = document.getElementById('resultInput').value;
            const side = document.getElementById('sideInput').value;
            const entryYear = document.getElementById('yearInput').value;

            if(!coin || isNaN(invest) || isNaN(pnl)) return alert("Sob puron korun!");
            if(res==='LOSS' && pnl > 0) pnl = -pnl;

            document.getElementById('saveBtn').innerText = "SAVING...";
            db.ref('trades').push({ coin, lev, invest, pnl, result: res, side, period: `${curMonth}-${entryYear}`, time: Date.now() })
            .then(() => { closeModal(); document.getElementById('saveBtn').innerText = "SAVE TO DATABASE"; })
            .catch(e => alert(e.message));
        }

        function delTrade(id) { if(confirm("Delete korben?")) db.ref('trades/' + id).remove(); }
        function openModal() { document.getElementById('tradeModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('tradeModal').style.display = 'none'; }
        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }
        
        initApp();
    </script>
</body>
</html>
